# Nginx reverse-proxy config for Spectrum Game on DigitalOcean
#
# Place this file at: /etc/nginx/sites-available/spectrum-game
# Then enable it:
#   sudo ln -s /etc/nginx/sites-available/spectrum-game /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain (e.g. game.example.com).
# Certbot (Let's Encrypt) will modify the HTTPS block automatically when you run:
#   sudo certbot --nginx -d YOUR_DOMAIN
#
# For multi-process PM2 cluster with sticky sessions, uncomment the upstream
# block and the proxy_pass line that uses it.

upstream spectrum_game {
    # Sticky sessions are required when PM2 cluster mode is used so that
    # each socket.io connection always reaches the same worker process.
    # ip_hash works well for most deployments; note that clients behind
    # a large shared NAT/proxy may all hash to the same upstream worker.
    # If that is a concern, use:  hash $cookie_io consistent;
    # (socket.io sets an io cookie on the first request).
    ip_hash;
    server 127.0.0.1:3000;
    # Add more workers here if you scale horizontally on multiple VPS nodes.
    # server 127.0.0.1:3001;
    # server 127.0.0.1:3002;
    # server 127.0.0.1:3003;
}

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Allow Let's Encrypt ACME challenges before the redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # --- SSL (managed by Certbot) ----------------------------------------
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Compression ------------------------------------------------------
    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml font/woff2;

    # --- Security headers -------------------------------------------------
    add_header X-Frame-Options        SAMEORIGIN        always;
    add_header X-Content-Type-Options nosniff           always;
    add_header Referrer-Policy        strict-origin      always;
    add_header X-XSS-Protection       "1; mode=block"   always;

    # --- Static React/Vite build -----------------------------------------
    root /var/www/spectrum-game/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache immutable Vite hashed assets aggressively.
        location ~* \.(js|css|woff2?|png|webp|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # --- API / socket.io --------------------------------------------------
    # Forward /health and /nimda HTTP requests, and all socket.io traffic,
    # to the Node.js server.
    location ~ ^/(health|nimda|socket\.io) {
        proxy_pass         http://spectrum_game;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade (socket.io long-polling fallback
        # also works without these, but WebSocket transport needs them).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow long-lived WebSocket connections.
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 60s;
    }
}
